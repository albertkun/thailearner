<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thai Trainer — learn to read & write Thai</title>
  <meta name="description" content="A private, offline-friendly trainer for reading and writing Thai. All progress stays on your device." />
  <!-- Thai webfonts so glyphs render consistently; the app still works without them
       (it falls back to whatever Thai font the system has).
       Four styles, switchable in Write → Style:
         Noto Sans Thai / Sarabun — looped print (the default)
         Noto Serif Thai          — looped with strong stroke contrast; the หัว loops read clearly
         Itim                     — looped handwriting, closest to how you write by hand
         Kanit                    — loopless/modern, the signage & logo style -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;600;700&family=Sarabun:wght@400;600&family=Noto+Serif+Thai:wght@400;600&family=Itim&family=Kanit:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <header class="app-header">
    <div class="brand"><span class="logo">🇹🇭</span> Thai Trainer</div>
    <div class="spacer"></div>
    <button id="theme-toggle" title="Toggle light/dark">🌓</button>
  </header>

  <nav class="nav">
    <button class="nav-btn" data-view="learn">📖 Learn</button>
    <button class="nav-btn" data-view="flash">🃏 Flashcards</button>
    <button class="nav-btn" data-view="write">✍️ Write</button>
    <button class="nav-btn" data-view="words">➕ Words</button>
    <button class="nav-btn" data-view="progress">📊 Progress</button>
  </nav>

  <main id="app"><!-- views render here --></main>

  <script src="assets/js/data.js"></script>
  <script src="assets/js/mnemonics.js"></script>
  <script src="assets/js/storage.js"></script>
  <script src="assets/js/tts.js"></script>
  <script src="assets/js/writing.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
